services:

  # ── Reverse proxy + SSL automatique ──────────────────────────
  traefik:
    image: traefik:v3.3
    environment:
      - DOCKER_API_VERSION=1.47
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=guillaume.biondo@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
    restart: unless-stopped

  # ── Base de données ───────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: papyrus
      POSTGRES_USER: papyrus
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ── Backend Laravel ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://api.papyrus.guigeek.tech
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: papyrus
      DB_USERNAME: papyrus
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_DRIVER: database
      SESSION_DOMAIN: .guigeek.tech
      SESSION_SECURE_COOKIE: "true"
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      SANCTUM_STATEFUL_DOMAINS: papyrus.guigeek.tech
      FRONTEND_URL: https://papyrus.guigeek.tech
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@papyrus.guigeek.tech}
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      - db
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`api.papyrus.guigeek.tech`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=80"
    restart: unless-stopped

  # ── Queue worker ──────────────────────────────────────────────
  worker:
    build:
      context: ./backend
    command: ["worker"]
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: papyrus
      DB_USERNAME: papyrus
      DB_PASSWORD: ${DB_PASSWORD}
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    volumes:
      - storage:/var/www/html/storage/app
    depends_on:
      - db
    restart: unless-stopped

  # ── Frontend Vue ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://api.papyrus.guigeek.tech/api/v1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`papyrus.guigeek.tech`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    restart: unless-stopped

volumes:
  pgdata:
  letsencrypt:
  storage:
